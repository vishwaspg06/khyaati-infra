version: 0.2

phases:
  install:
    commands:
      - echo "Installing Terraform..."
      - wget https://releases.hashicorp.com/terraform/1.12.2/terraform_1.12.2_linux_amd64.zip
      - unzip terraform_1.12.2_linux_amd64.zip
      - mv terraform /usr/local/bin/
      - terraform version

  build:
    commands:
      - echo "Terraform Init"
      - terraform init

      - echo "Terraform Validate"
      - terraform validate

      - echo "Terraform Plan"
      - terraform plan
